name: Keep Streamlit Awake with Empty Commit

on:
  schedule:
    # 6시간마다 실행 (00:00, 06:00, 12:00, 18:00 UTC 기준)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Git Auto Commit (Empty)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Keep-alive: Periodic activity to prevent Streamlit sleep"
          git push
