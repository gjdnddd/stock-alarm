name: Stock Alarm Daily

on:
  schedule:
    # 1. 아침 알람 (07:00 KST / UTC 22:00) - 화~토 (미국 장 마감 후)
    - cron: '0 22 * * 1-5'
    # 2. 오후 알람 (16:50 KST / UTC 07:50) - 월~금
    - cron: '50 7 * * 1-5'
  workflow_dispatch: # 필요할 때 언제든 버튼으로 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install yfinance requests
      - name: Run script
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_GIST_ID: ${{ secrets.MY_GIST_ID }}
          MY_TELEGRAM_TOKEN: ${{ secrets.MY_TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python main.py
