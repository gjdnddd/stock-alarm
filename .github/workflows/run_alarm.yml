name: Stock Alarm Daily

on:
  push:
    branches: [ "main" ]  # 코드를 수정하고 저장하면 즉시 빌드 시작!
  schedule:
    - cron: '0 18 * * *'    # 03:00 KST
    - cron: '0 20 * * 1-5' # 05:00 KST
    - cron: '0 6 * * *'     # 15:00 KST
  workflow_dispatch:        # 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install yfinance requests
      - name: Run script
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_GIST_ID: ${{ secrets.MY_GIST_ID }}
          MY_TELEGRAM_TOKEN: ${{ secrets.MY_TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python main.py
