name: Stock Alarm Daily

on:
  schedule:
    - cron: '0 18 * * *'    # 03:00 KST
    - cron: '0 20 * * 1-5' # 05:00 KST
    - cron: '0 6 * * *'     # 15:00 KST
  workflow_dispatch:        # 이 부분이 있어야 'Run workflow' 버튼이 생깁니다!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Run script
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_GIST_ID: ${{ secrets.MY_GIST_ID }}
          MY_TELEGRAM_TOKEN: ${{ secrets.MY_TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python main.py
