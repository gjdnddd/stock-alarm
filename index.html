<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stock Alarm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen font-sans">
  <div class="p-4 max-w-2xl mx-auto">

    <!-- 헤더 -->
    <div class="flex items-center justify-between mb-2">
      <h1 class="text-lg font-bold flex items-center gap-2">
        <span class="text-emerald-400">📈</span> Stock Alarm
      </h1>
      <div class="flex gap-2">
        <button onclick="refreshAll()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-bold shadow-lg transition-all active:scale-95">새로고침</button>
        <button onclick="toggleSettings()" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">⚙️</button>
      </div>
    </div>

    <p id="status-msg" class="text-[11px] text-slate-500 mb-4 h-4 flex items-center gap-1"></p>

    <!-- 설정 패널 -->
    <div id="settings-panel" class="hidden mb-6 bg-slate-800 rounded-2xl p-5 shadow-2xl border border-slate-700/50">
      <div class="space-y-2">
        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">API & Gist 설정</h2>
        <input id="inp-gist-id" type="text" placeholder="Gist ID"
               class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
        <input id="inp-token" type="password" placeholder="GitHub Token"
               class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
        <input id="inp-finnhub" type="password" placeholder="Finnhub API Key (선택)"
               class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
        <div class="grid grid-cols-2 gap-2 pt-1">
          <input id="m-qqq-p" type="number" step="0.01" placeholder="QQQ 수동가격"
                 class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-sm outline-none">
          <input id="m-soxx-p" type="number" step="0.01" placeholder="SOXX 수동가격"
                 class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-sm outline-none">
        </div>
        <div class="flex gap-2 pt-1">
          <button onclick="saveSettings()" class="flex-1 py-2 bg-blue-600 hover:bg-blue-500 rounded-xl text-sm font-bold">설정 저장</button>
          <button onclick="applyManual()" class="flex-1 py-2 bg-orange-600 hover:bg-orange-500 rounded-xl text-sm font-bold">수동 적용</button>
        </div>
      </div>
    </div>

    <!-- 카드 영역 -->
    <div id="card-QQQ"></div>
    <div id="card-SOXX"></div>

  </div>

  <script>
    let stockData = null;
    let prices = { QQQ: { current: 0, ath: 0 }, SOXX: { current: 0, ath: 0 } };

    const getConfig = () => ({
      gistId: localStorage.getItem('gist_id') || '',
      token:  localStorage.getItem('gist_token') || '',
      finnhub: localStorage.getItem('finnhub_token') || ''
    });

    const setStatus = msg => {
      const el = document.getElementById('status-msg');
      el.innerHTML = msg ? `<span>●</span> ${msg}` : '';
    };

    const now = () => new Date().toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

    // ── 설정 ───────────────────────────────────────────────────────

    function toggleSettings() {
      const p = document.getElementById('settings-panel');
      p.classList.toggle('hidden');
      if (!p.classList.contains('hidden')) {
        const c = getConfig();
        document.getElementById('inp-gist-id').value  = c.gistId;
        document.getElementById('inp-token').value    = c.token;
        document.getElementById('inp-finnhub').value  = c.finnhub;
      }
    }

    function saveSettings() {
      localStorage.setItem('gist_id',       document.getElementById('inp-gist-id').value.trim());
      localStorage.setItem('gist_token',    document.getElementById('inp-token').value.trim());
      localStorage.setItem('finnhub_token', document.getElementById('inp-finnhub').value.trim());
      toggleSettings();
      init();
    }

    function applyManual() {
      ['QQQ', 'SOXX'].forEach(t => {
        const cp = parseFloat(document.getElementById(`m-${t.toLowerCase()}-p`).value);
        if (cp > 0) prices[t].current = cp;
      });
      renderAll();
      setStatus('수동 가격 적용됨 · ' + now());
      document.getElementById('settings-panel').classList.add('hidden');
    }

    // ── 가격 조회 ──────────────────────────────────────────────────

    async function fetchYahoo(ticker) {
      const base  = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=5y`;
      const proxy = `https://corsproxy.io/?${encodeURIComponent(base)}`;
      try {
        const r = await fetch(proxy);
        const j = await r.json();
        const res = j.chart?.result?.[0];
        const current = res?.meta?.regularMarketPrice;
        const closes  = res?.indicators?.quote?.[0]?.close?.filter(c => c != null) || [];
        const ath = closes.length ? Math.max(...closes) : 0;
        return { current, ath: Math.max(ath, current) };
      } catch { return null; }
    }

    async function fetchPrice(ticker) {
      const key = getConfig().finnhub;
      const yahoo = await fetchYahoo(ticker);  // ATH는 항상 Yahoo 기준
      if (key) {
        try {
          const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${key}`, { cache: 'no-store' });
          const q = await res.json();
          const current = q.c > 0 ? q.c : q.pc;
          if (current) return { current, ath: Math.max(yahoo?.ath || 0, current) };
        } catch {}
      }
      return yahoo;
    }

    // ── Gist ───────────────────────────────────────────────────────

    async function fetchGistData() {
      const { gistId, token } = getConfig();
      if (!gistId || !token) return false;
      try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`, {
          headers: { Authorization: `token ${token}` }, cache: 'no-store'
        });
        const j = await res.json();
        const raw = j.files?.['stock_data.json']?.content;
        if (raw) { stockData = JSON.parse(raw); return true; }
      } catch { setStatus('Gist 로드 실패'); }
      return false;
    }

    async function saveToGist() {
      const { gistId, token } = getConfig();
      if (!gistId || !token || !stockData) return false;
      try {
        const res = await fetch(`https://api.github.com/gists/${gistId}`, {
          method: 'PATCH',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ files: { 'stock_data.json': { content: JSON.stringify(stockData, null, 2) } } })
        });
        return res.ok;
      } catch { return false; }
    }

    // ── Alert 계산 ─────────────────────────────────────────────────

    function getBuyStatus(ticker, drop) {
      if (ticker === 'QQQ') {
        if (drop <= -21) return { label: '🚨 1+2+3차 도달', cls: 'text-red-400 font-bold',  sub: `현재 ${drop.toFixed(1)}% / 기준 -19~21%` };
        if (drop <= -20) return { label: '🚨 1+2차 도달',   cls: 'text-red-400 font-bold',  sub: `현재 ${drop.toFixed(1)}% / 기준 -19~21%` };
        if (drop <= -19) return { label: '🚨 1차 도달',     cls: 'text-red-400 font-bold',  sub: `현재 ${drop.toFixed(1)}% / 기준 -19~21%` };
        if (drop <= -14) return { label: '⚠️ 근접',         cls: 'text-yellow-400',          sub: `현재 ${drop.toFixed(1)}% / 1차 기준 -19%` };
        return             { label: '✅ 대기',              cls: 'text-slate-500',           sub: `현재 ${drop.toFixed(1)}% / 기준 -19~21%` };
      } else {
        if (drop <= -25) return { label: '🚨 1+2+3차 도달', cls: 'text-red-400 font-bold',  sub: `현재 ${drop.toFixed(1)}% / 기준 -20~25%` };
        if (drop <= -22) return { label: '🚨 1+2차 도달',   cls: 'text-red-400 font-bold',  sub: `현재 ${drop.toFixed(1)}% / 기준 -20~25%` };
        if (drop <= -20) return { label: '🚨 1차 도달',     cls: 'text-red-400 font-bold',  sub: `현재 ${drop.toFixed(1)}% / 기준 -20~25%` };
        if (drop <= -15) return { label: '⚠️ 근접',         cls: 'text-yellow-400',          sub: `현재 ${drop.toFixed(1)}% / 1차 기준 -20%` };
        return             { label: '✅ 대기',              cls: 'text-slate-500',           sub: `현재 ${drop.toFixed(1)}% / 기준 -20~25%` };
      }
    }

    function getHardStatus(ticker, drop) {
      if (ticker === 'QQQ') {
        if (drop <= -30) return { label: '💀 하드 진입',      cls: 'text-red-400 font-black',  sub: `현재 ${drop.toFixed(1)}% / 기준 -30%` };
        if (drop <= -25) return { label: '⚠️ 하드 근접',      cls: 'text-orange-400',           sub: `현재 ${drop.toFixed(1)}% / 기준 -30%` };
        return             { label: '✅ 대기',               cls: 'text-slate-500',            sub: `현재 ${drop.toFixed(1)}% / 기준 -30%` };
      } else {
        if (drop <= -40) return { label: '💀 하드 2단계 진입', cls: 'text-red-400 font-black',  sub: `현재 ${drop.toFixed(1)}% / 기준 -40%` };
        if (drop <= -35) return { label: '💀 하드 1단계 진입', cls: 'text-red-400 font-black',  sub: `현재 ${drop.toFixed(1)}% / 기준 -35%` };
        if (drop <= -30) return { label: '⚠️ 하드 1단계 근접', cls: 'text-orange-400',           sub: `현재 ${drop.toFixed(1)}% / 기준 -35%` };
        return             { label: '✅ 대기',               cls: 'text-slate-500',            sub: `현재 ${drop.toFixed(1)}% / 기준 -35~40%` };
      }
    }

    function getInfiStatus(ticker, data, cp) {
      const hae = data?.infi_hae || 0;
      if (hae <= 0) return { label: '⏸ HAE 없음', cls: 'text-slate-600', sub: 'HAE 입력 후 활성화' };
      const drop = (cp / hae - 1) * 100;
      const limit = ticker === 'QQQ' ? -3 : -4;
      const near  = limit + 1;
      if (drop <= limit) return { label: '🔴 즉시매수!', cls: 'text-red-400 font-bold',   sub: `HAE $${hae.toFixed(2)} / 현재 ${drop.toFixed(1)}% / 기준 ${limit}%` };
      if (drop <= near)  return { label: '🟡 근접',      cls: 'text-yellow-400',           sub: `HAE $${hae.toFixed(2)} / 현재 ${drop.toFixed(1)}% / 기준 ${limit}%` };
      return               { label: '✅ 대기',           cls: 'text-slate-500',            sub: `HAE $${hae.toFixed(2)} / 현재 ${drop.toFixed(1)}% / 기준 ${limit}%` };
    }

    function getSellStatus(ticker, data, drop, gain) {
      const unlock = ticker === 'QQQ' ? 120 : 80;
      if (gain === null) return { label: '⏸ 사이클 없음', cls: 'text-slate-600', sub: '사이클 시작 후 활성화' };

      const unlocked = data?.sell_unlocked || gain >= unlock;
      if (!unlocked) {
        if (gain >= unlock - 5)
          return { label: '🔔 잠금 해제 근접', cls: 'text-blue-400', sub: `저점 대비 +${gain.toFixed(1)}% / 기준 +${unlock}%` };
        return   { label: '🔒 감시 비활성',   cls: 'text-slate-500', sub: `저점 대비 +${gain.toFixed(1)}% / 기준 +${unlock}%` };
      }

      if (ticker === 'QQQ') {
        const done1 = data?.sell_1st_done;
        if (!done1) {
          if (drop <= -5) return { label: '💰 1차 매도!',       cls: 'text-orange-400 font-bold', sub: `ATH 대비 ${drop.toFixed(1)}% → TQQQ 50% 매도` };
          return           { label: '👁 1차 매도 감시 중',   cls: 'text-green-400',             sub: `ATH 대비 ${drop.toFixed(1)}% / 기준 -5%` };
        }
        const cnt = data?.sell_2nd_count || 0;
        if (cnt >= 2) return { label: '💰 2차 매도!',           cls: 'text-orange-400 font-bold', sub: '동일 ATH -10% 2회 → 잔여 전량 매도' };
        return         { label: `👁 2차 매도 감시 ${cnt}/2`, cls: 'text-green-400',             sub: `ATH 대비 ${drop.toFixed(1)}%` };
      } else {
        const consec = data?.soxx_consecutive || 0;
        if (consec >= 5) return { label: '💰 매도!',                    cls: 'text-orange-400 font-bold', sub: 'ATH -10% 5거래일 연속 → 전량 매도' };
        if (consec >= 3) return { label: `⚠️ 매도 카운트 ${consec}/5`, cls: 'text-yellow-400',            sub: `${5 - consec}거래일 남음 / ATH 대비 ${drop.toFixed(1)}%` };
        if (consec > 0)  return { label: `👁 감시 중 ${consec}/5`,      cls: 'text-green-400',             sub: `ATH 대비 ${drop.toFixed(1)}%` };
        return             { label: '👁 감시 중',                      cls: 'text-green-400',             sub: `ATH 대비 ${drop.toFixed(1)}% / 기준 -10% × 5일` };
      }
    }

    // ── 렌더링 ─────────────────────────────────────────────────────

    function renderCard(ticker) {
      const etf  = ticker === 'QQQ' ? 'TQQQ' : 'SOXL';
      const cp   = prices[ticker].current;
      const ath  = prices[ticker].ath;
      const data = stockData?.[ticker] || {};
      const drop = ath > 0 ? (cp / ath - 1) * 100 : 0;
      const dropCls = drop <= -15 ? 'text-red-400' : drop <= -5 ? 'text-yellow-400' : 'text-green-400';

      const cycleLow = data?.cycle_low || null;
      const gain     = cycleLow ? (cp / cycleLow - 1) * 100 : null;
      const gainStr  = gain !== null ? `${gain >= 0 ? '+' : ''}${gain.toFixed(1)}%` : null;
      const gainCls  = gain !== null ? (gain >= 0 ? 'text-green-400' : 'text-red-400') : '';

      const buyS  = getBuyStatus(ticker, drop);
      const hardS = getHardStatus(ticker, drop);
      const sellS = getSellStatus(ticker, data, drop, gain);

      document.getElementById(`card-${ticker}`).innerHTML = `
        <div class="bg-slate-800 rounded-2xl p-5 mb-4 shadow-xl border border-slate-700/30">

          <!-- 가격 헤더 -->
          <div class="flex justify-between items-end mb-2">
            <div>
              <h3 class="text-xl font-black tracking-tight">
                ${ticker} <span class="text-sm font-normal text-slate-400">→ ${etf}</span>
              </h3>
            </div>
            <div class="text-right">
              <div class="text-2xl font-black ${dropCls}">${drop.toFixed(1)}%</div>
              <div class="text-[11px] text-slate-400">$${cp.toFixed(2)} / ATH $${ath.toFixed(2)}</div>
            </div>
          </div>

          <!-- 사이클 저점 -->
          ${cycleLow
            ? `<div class="mb-3 text-[12px] text-slate-300">
                 저점 $${cycleLow.toFixed(2)} → <span class="${gainCls} font-bold">${gainStr}</span>
               </div>`
            : `<div class="mb-3 text-[11px] text-slate-600">사이클 없음</div>`
          }

          <!-- 상태 행 -->
          <div class="space-y-2">
            ${statusRow('무매', getInfiStatus(ticker, data, cp))}
            ${statusRow('매수', buyS)}
            ${statusRow('하드', hardS)}
            ${statusRow('매도', sellS)}
          </div>

          <!-- 사이클 설정 토글 -->
          <button onclick="document.getElementById('edit-${ticker}').classList.toggle('hidden')"
                  class="w-full mt-4 pt-3 border-t border-slate-700/50 text-[11px] text-slate-500 flex justify-between">
            <span>CYCLE SETTINGS</span><span>▼</span>
          </button>
          <div id="edit-${ticker}" class="hidden pt-3 space-y-2">
            <!-- 무매 HAE -->
            <div class="bg-slate-900/50 p-3 rounded-xl space-y-2">
              <label class="text-[10px] text-slate-400 block">무매 HAE (매도 후 재설정)</label>
              <div class="flex gap-2">
                <input id="${ticker}-hae" type="number" step="0.01"
                       placeholder="0.00" value="${data?.infi_hae || ''}"
                       class="flex-1 bg-slate-800 rounded-lg px-3 py-2 text-sm outline-none border border-slate-700 focus:border-yellow-500">
                <button onclick="saveHae('${ticker}')"
                        class="px-4 py-2 bg-yellow-600 hover:bg-yellow-500 rounded-lg text-sm font-bold transition-all active:scale-95">
                  저장
                </button>
              </div>
            </div>
            <!-- 사이클 저점 -->
            <div class="bg-slate-900/50 p-3 rounded-xl space-y-2">
              <label class="text-[10px] text-slate-400 block">사이클 저점 입력</label>
              <input id="${ticker}-cycle-low" type="number" step="0.01"
                     placeholder="0.00" value="${cycleLow || ''}"
                     class="w-full bg-slate-800 rounded-lg px-3 py-2 text-sm outline-none border border-slate-700 focus:border-emerald-500">
              <div class="flex gap-2">
                <button onclick="startCycle('${ticker}')"
                        class="flex-1 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-sm font-bold transition-all active:scale-95">
                  🚀 사이클 시작
                </button>
                <button onclick="endCycle('${ticker}')"
                        class="flex-1 py-2 bg-red-600/80 hover:bg-red-500 rounded-lg text-sm font-bold transition-all active:scale-95">
                  ⏹ 사이클 종료
                </button>
              </div>
              ${cycleLow ? `<p class="text-[10px] text-slate-500">현재 저점: $${cycleLow.toFixed(2)} · 종료 후 재시작하면 상태 초기화</p>` : ''}
            </div>
          </div>

        </div>`;
    }

    function statusRow(name, s) {
      return `<div class="flex items-center justify-between bg-slate-700/20 p-3 rounded-xl border border-white/5">
        <div>
          <div class="text-[11px] text-slate-400">${name}</div>
          <div class="text-[10px] text-slate-500 mt-0.5">${s.sub}</div>
        </div>
        <div class="${s.cls} text-sm text-right">${s.label}</div>
      </div>`;
    }

    function renderAll() { renderCard('QQQ'); renderCard('SOXX'); }

    // ── 사이클 관리 ────────────────────────────────────────────────

    async function saveHae(ticker) {
      const val = parseFloat(document.getElementById(`${ticker}-hae`).value);
      if (!val || val <= 0) { alert('HAE 가격을 입력해주세요'); return; }
      if (!stockData) stockData = {};
      if (!stockData[ticker]) stockData[ticker] = {};
      stockData[ticker].infi_hae = val;
      const ok = await saveToGist();
      renderAll();
      setStatus(ok ? `✅ ${ticker} HAE 저장 · ${now()}` : `❌ 저장 실패`);
    }

    async function startCycle(ticker) {
      const val = parseFloat(document.getElementById(`${ticker}-cycle-low`).value);
      if (!val || val <= 0) { alert('저점 가격을 입력해주세요'); return; }
      if (!stockData) stockData = {};
      stockData[ticker] = {
        cycle_low:         val,
        sell_unlocked:     false,
        sell_1st_done:     false,
        sell_2nd_ath:      null,
        sell_2nd_count:    0,
        sell_2nd_last_date: null,
        soxx_consecutive:  0,
        soxx_last_date:    null
      };
      const ok = await saveToGist();
      renderAll();
      if (ok) launchConfetti();
      setStatus(ok ? `✅ ${ticker} 사이클 시작 · ${now()}` : `❌ 저장 실패`);
    }

    async function endCycle(ticker) {
      if (!confirm(`${ticker} 사이클을 종료하시겠습니까?`)) return;
      if (!stockData) stockData = {};
      stockData[ticker] = { cycle_low: null };
      const ok = await saveToGist();
      renderAll();
      setStatus(ok ? `✅ ${ticker} 사이클 종료 · ${now()}` : `❌ 저장 실패`);
    }

    // ── 새로고침 ───────────────────────────────────────────────────

    async function refreshAll() {
      setStatus('데이터 동기화 중...');
      await fetchGistData();
      const [q, s] = await Promise.all([fetchPrice('QQQ'), fetchPrice('SOXX')]);
      if (q) prices.QQQ = q;
      if (s) prices.SOXX = s;
      renderAll();
      setStatus('✅ 업데이트 완료 · ' + now());
    }

    function launchConfetti() {
      const end = Date.now() + 1500;
      const colors = ['#10b981', '#3b82f6', '#f59e0b'];
      (function frame() {
        confetti({ particleCount: 3, angle: 60,  spread: 55, origin: { x: 0 }, colors });
        confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors });
        if (Date.now() < end) requestAnimationFrame(frame);
      }());
    }

    async function init() {
      const c = getConfig();
      if (!c.gistId || !c.token) {
        setStatus('⚙️ Gist 설정을 완료해주세요.');
        toggleSettings();
        return;
      }
      await refreshAll();
    }
    init();
  </script>
</body>
</html>
